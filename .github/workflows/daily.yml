name: 🎬 Shorts Agent — Auto Publisher

on:
  schedule:
    - cron: "0 23 * * *"   # 4:30 AM IST
    - cron: "0 15 * * *"   # 8:30 PM IST
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        default: "Manual trigger"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🎞️ Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run Shorts Pipeline
        env:
          GROQ_API_KEY:               ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          ACTIVEPIECES_WEBHOOK_URL:   ${{ secrets.ACTIVEPIECES_WEBHOOK_URL }}
        run: python main.py

      - name: 📊 Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_number }}
          path: output/run_log.json
          retention-days: 30
          
